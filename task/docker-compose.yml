version: '3.8'
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: chepelevpv-netology-prometheus
    restart: always
    ports: 
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - pdata:/prometheus
    networks: ["chepelevpv-my-netology-hw"]
  pushgateway:
    depends_on:
      - prometheus

    image: prom/pushgateway
    container_name: chepelevpv-netology-pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks: ["chepelevpv-my-netology-hw"]
  grafana:
    depends_on:
      - prometheus
    image: grafana/grafana:latest
    container_name: chepelevpv-netology-grafana
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - GF_PATHS_CONFIG=/etc/grafana/custom.ini
    volumes:
      - gdata:/var/lib/grafana/
      - ./grafana/custom.ini:/etc/grafana/custom.ini
    

    networks: ["chepelevpv-my-netology-hw"]

volumes:
  pdata: {}
  gdata: {}
networks:
  chepelevpv-my-netology-hw:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16
